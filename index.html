<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brian Ariel Lapido | CV Publico</title>
    <meta
      name="description"
      content="CV publico de Brian Ariel Lapido con acceso directo a redes, WhatsApp y email."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="professional">
    <section class="folder-modal is-hidden" id="public-folder-modal">
      <article class="folder-modal-card">
        <div class="folder-modal-head">
          <div>
            <p class="panel-eyebrow">Carpeta multimedia</p>
            <h2 id="public-folder-title">Archivos</h2>
          </div>
          <button type="button" data-action="close-public-folder">Cerrar</button>
        </div>
        <div class="folder-modal-body" id="public-folder-body"></div>
      </article>
    </section>

    <main class="public-shell">
      <section class="public-hero">
        <article class="hero-card portrait-card">
          <div class="portrait-frame">
            <img id="public-photo" src="./img/perfil.png" alt="Foto de Brian Ariel Lapido" />
          </div>
          <div class="hero-badges" id="public-badges"></div>
        </article>

        <article class="hero-card public-intro">
          <p class="panel-eyebrow">CV Publico</p>
          <div id="public-profile"></div>
        </article>
      </section>

      <section class="public-section-list" id="public-sections"></section>
    </main>

    <script src="./src/public.js"></script>
  </body>
</html>
